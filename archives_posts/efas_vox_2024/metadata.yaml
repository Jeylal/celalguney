      b) Metadaten und Dokumentation zu den Nutzer-Uploads hinzuzufügen;\n\nc) die\
      \ Metadaten der Nutzer-Uploads auf der Plattform zu veröffentlichen;\n\nd) die\
      \ Metadaten der Nutzer-Uploads Dritten (z. B. CLARIN, CESSDA) für Auffindbarkeit\
      \ und Analysen zur Verfügung zu stellen;\n\ne) innerhalb der bestehenden SWISSUbase-Infrastruktur\
      \ und -Dienste Nutzer-Uploads zur Sicherstellung der künftigen Langzeitarchivierung\
      \ und Zugänglichkeit sowie zur Verbesserung der Nutzbarkeit und/oder zum Schutz\
      \ der Vertraulichkeit zu speichern, zu übersetzen, zu kopieren und zu migrieren.\n\
      \nSie gestatten SWISSUbase und den Kooperationspartnern ferner, Datenanalysen\
      \ zur Erstellung von Downloadstatistiken sowie zur Ermittlung von Datenvolumina\
      \ und weiteren Metriken durchzuführen.\n\n\n8. Nutzungsvertrag\n\nSie schliessen\
      \ mit den jeweiligen Datenkonsumenten/Datenkonsumentinnen einen Nutzungsvertrag\
      \ ab, in dem Sie die Weiterverwendung Ihrer Nutzer-Uploads (z. B. Urheberrechtsbedingungen)\
      \ regeln.\n\nWir übernehmen keine Haftung dafür, dass der zwischen Ihnen und\
      \ den Datenkonsumenten/Datenkonsumentinnen geschlossene Nutzungsvertrag die\
      \ Weiterverwendung Ihrer Nutzer-Uploads umfassend und zu Ihren Gunsten regelt.\
      \ Sie sind verantwortlich für die Auswahl und das Verständnis des geeigneten\
      \ Nutzungsvertrags (es stehen unterschiedliche Optionen zur Verfügung). Die\
      \ zuständige DSU unterstützt den/die Datenhinterleger*in bei der Auswahl des\
      \ Nutzungsvertrags. Für Verstösse der Datenkonsumenten/Datenkonsumentinnen gegen\
      \ den Nutzungsvertrag übernehmen wir keine Haftung.\n\n\n9. Nutzung der Nutzer-Uploads\
      \ durch Dritte\n\nAls Datenhinterleger*in verpflichten Sie sich sicherzustellen,\
      \ dass Ihre Nutzer-Uploads keine Rechte Dritter verletzen und auf der Plattform\
      \ entsprechend veröffentlicht oder archiviert werden können und dass die Datenkonsumenten/Datenkonsumentinnen\
      \ Ihre Nutzer-Uploads in Übereinstimmung mit den von Ihnen im Nutzungsvertrag\
      \ festgelegten Bedingungen verwenden dürfen.\nSie stellen uns von sämtlichen\
      \ Drittansprüchen frei, die sich aus datenschutzrechtlichen, urheberrechtlichen\
      \ oder sonstigen rechtlichen Streitigkeiten in Zusammenhang mit Ihrer nicht\
      \ vertraglich gedeckten oder rechtswidrigen Nutzung der SWISSUbase-Dienste ergeben.\n\
      \n\n10. Änderung der Nutzer-Uploads\n\nGrundsätzlich ist die jeweilige DSU nur\
      \ mit Zustimmung oder auf Veranlassung der Datenhinterleger*innen berechtigt,\
      \ Nutzer-Uploads zu ändern.\n\nDie jeweilige DSU ist jedoch befugt, Metadaten\
      \ der Nutzer-Uploads ohne Zustimmung des/der Datenhinterleger*in zu ändern,\
      \ sofern diese Änderungen der Verbesserung der Auffindbarkeit, Wiederverwendbarkeit\
      \ und der Langzeitarchivierung des Datensatzes dienen.\n\n\n11. Entfernung von\
      \ Nutzer-Uploads von der Plattform\n\nAls Datenhinterleger*in können Sie die\
      \ zuständige DSU um Löschung Ihrer Nutzer-Uploads ersuchen. Der/Die Datenhinterleger*in\
      \ muss einen plausiblen Grund für die Löschung vorlegen. Bei Löschung eines\
      \ Datensatzes behalten sich SWISSUbase und die Kooperationspartner das Recht\
      \ vor, bestimmte mit den Nutzer-Uploads verbundene Metadaten (z. B. Zitation\
      \ bereits veröffentlichter Datensätze) zwecks Nachvollziehbarkeit (z. B. «Tombstone-Seite»\
      \ des vormals veröffentlichten Datensatzes) aufzubewahren. Ein formeller Prozess\
      \ für Löschanträge, deren Genehmigung und Dokumentation ist eingerichtet.\n\n\
      Grundsätzlich darf die zuständige DSU-Nutzer-Uploads nur mit Zustimmung der\
      \ Datenhinterleger*innen löschen. Es bestehen jedoch Fälle, in denen die DSU-Nutzer-Uploads\
      \ (oder Teile davon) ohne Zustimmung der Datenhinterleger*innen löschen wird,\
      \ etwa:\n\n– bei Verletzung dieses Hinterlegungsvertrags;\n\n– aus rechtlichen\
      \ Gründen: rechtswidrige Inhalte in den Nutzer-Uploads (z. B. Datenschutzverletzungen,\
      \ Urheberrechtsverletzungen) oder wissenschaftliches Fehlverhalten (z. B. Fälschung,\
      \ Erfindung, Plagiat);\n\n– wenn Nutzer-Uploads sensible oder personenbezogene\
      \ Daten enthalten, die entfernt werden müssen;\n\n– bei Publikationsfehlern;\n\
      \n– wenn der/die Datenhinterleger*in oder deren Vertreter*innen nicht mehr erreichbar\
      \ sind;\n\n– wenn die maximale Archivierungsdauer erreicht ist (8);\n\n– aus\
      \ den in den Nutzungsbedingungen (Ziff. 6) genannten Gründen.\n\n\n12. Datenschutz\n\
      \nBezüglich der von uns als Verantwortlicher verarbeiteten personenbezogenen\
      \ Daten verweisen wir auf unsere Datenschutzerklärung (9).\n\nEnthalten Ihre\
      \ Nutzer-Uploads Personendaten (vgl. Ziff. 5 b), können wir diese im Rahmen\
      \ dieses Vertrags als Auftragsbearbeiter verarbeiten. In diesem Fall gelten\
      \ die nachfolgenden Ziff. 13 und 14.\n\nJede SWISSUbase-Partnerinstitution und\
      \ die Kooperationspartner halten die für sie anwendbaren kantonalen oder eidgenössischen\
      \ Datenschutzbestimmungen ein.\n\n\n13. Bedingungen zur Datenbearbeitung\n\n\
      13.1. Anwendungsbereich\n\nDiese Bedingungen gelten für die Verarbeitung personenbezogener\
      \ Daten (einschliesslich besonders schützenswerter Personendaten) durch die\
      \ jeweiligen SWISSUbase-Partnerinstitutionen und die Kooperationspartner (Auftragsbearbeiter)\
      \ im Auftrag der Datenhinterleger*innen. In diesem Zusammenhang gelten die Datenhinterleger*innen\
      \ als Verantwortliche.\n\n13.2. Einzelheiten der Verarbeitung\n\nArt und Zweck\
      \ der Verarbeitung richten sich nach den von SWISSUbase und den Kooperationspartnern\
      \ im Rahmen dieses Vertrags erbrachten Leistungen. SWISSUbase und die Kooperationspartner\
      \ verarbeiten die personenbezogenen Daten ausschliesslich im Rahmen dieses Vertrags\
      \ und gemäss den Instruktionen der Datenhinterleger*innen. Eine Verarbeitung\
      \ zu anderen Zwecken findet nicht statt.\n\nSWISSUbase und die Kooperationspartner\
      \ verarbeiten Inhaltsdaten, d. h. personenbezogene Daten, die in den Nutzer-Uploads\
      \ enthalten sind (Metadaten, Datensätze, Dateien). Zu den betroffenen Personengruppen\
      \ gehören Autoren/Autorinnen, Forscher*innen, Studienteilnehmende, Interviewpartner*innen\
      \ und weitere in den Nutzer-Uploads genannte Personen. SWISSUbase verarbeitet\
      \ Inhaltsdaten bis zur Beendigung dieses Hinterlegungsvertrags gemäss Ziff.\
      \ 16 oder bis die Nutzer-Uploads aus anderen in Ziff. 11 genannten Gründen gelöscht\
      \ werden.\n\n13.3. Unterauftragsverarbeitung\n\nEine Liste der aktuell von SWISSUbase\
      \ eingesetzten Subprozessoren ist unter Drittanbieter (10) veröffentlicht.\n\
      \nDie zum Zeitpunkt der Vertragsunterzeichnung eingesetzten Subprozessoren gelten\
      \ mit der Nutzung der SWISSUbase-Dienste als vom/von der Datenhinterleger*in\
      \ genehmigt. SWISSUbase kann zusätzliche Subprozessoren einsetzen oder bestehende\
      \ ersetzen. In solchen Fällen informiert SWISSUbase die Datenhinterleger*innen\
      \ in geeigneter Weise über die vorgesehene Änderung, bevor die Subprozessoren\
      \ ihre Tätigkeit aufnehmen. Der/Die Datenhinterleger*in hat das Recht, der Einsetzung\
      \ eines Subprozessoren schriftlich innerhalb von 20 Tagen nach Mitteilung durch\
      \ SWISSUbase zu widersprechen. Kommt es zu einem Widerspruch, behalten sich\
      \ SWISSUbase und die Kooperationspartner das Recht vor, den Hinterlegungsvertrag\
      \ mit dem/der betreffenden Datenhinterleger*in zu kündigen.\n\nSWISSUbase verpflichtet\
      \ vertraglich sämtliche eingesetzten Subprozessoren zur Einhaltung der datenschutz-\
      \ und datensicherheitsrelevanten Verpflichtungen gemäss diesem Vertrag. SWISSUbase\
      \ bleibt gegenüber dem/der Datenhinterleger*in verantwortlich und verpflichtet,\
      \ die Einhaltung dieser Verpflichtungen durch die Subprozessoren sicherzustellen.\n\
      \n13.4. Grenzüberschreitende Datenbearbeitung\n\nSWISSUbase und die Kooperationspartner\
      \ verpflichten sich, personenbezogene Daten ausschliesslich in der Schweiz oder\
      \ in Mitgliedstaaten des Europäischen Wirtschaftsraums (EWR) zu verarbeiten.\
      \ Jede Verarbeitung personenbezogener Daten in einem Drittstaat ausserhalb der\
      \ Schweiz oder des EWR erfolgt ausschliesslich in Übereinstimmung mit den Voraussetzungen\
      \ von Art. 16 und 17 DSG.\n\n13.5. Rechte betroffener Personen\n\nSWISSUbase\
      \ und die Kooperationspartner sind nicht primär verantwortlich für die Gewährleistung\
      \ der Rechte betroffener Personen. Erhält SWISSUbase eine Anfrage einer betroffenen\
      \ Person, für welche SWISSUbase oder ein Kooperationspartner gemäss diesem Vertrag\
      \ als Auftragsbearbeiter tätig ist, verweist SWISSUbase die betroffene Person\
      \ an die jeweiligen Datenhinterleger*innen.\n\nSWISSUbase und die Kooperationspartner\
      \ unterstützen die Datenhinterleger*innen in angemessener Weise bei der Wahrung\
      \ der Rechte betroffener Personen.\n\n\n14. Datensicherheit\n\nWir treffen geeignete\
      \ technische und organisatorische Massnahmen gemäss dem aktuellen Stand der\
      \ Technik und den anwendbaren gesetzlichen Vorgaben, die geeignet sind, Verletzungen\
      \ der Datensicherheit zu verhindern.\n\nDie derzeit implementierten technischen\
      \ und organisatorischen Massnahmen sind auf der SWISSUbase Info-Website (11)\
      \ publiziert. Diese Massnahmen können weiterentwickelt und angepasst werden.\n\
      \nIm Falle einer Verletzung der Datensicherheit im Zusammenhang mit der Erbringung\
      \ der SWISSUbase-Dienste informiert SWISSUbase die betroffenen Datenhinterleger*innen\
      \ unverzüglich schriftlich. SWISSUbase ergreift unverzüglich die notwendigen\
      \ Massnahmen innerhalb ihres Verantwortungsbereichs, um die Datensicherheit\
      \ wiederherzustellen und mögliche nachteilige Folgen für betroffene Personen\
      \ zu minimieren.\n\n\n15.\tHaftung\nSoweit gesetzlich zulässig, haften wir und\
      \ unsere Hilfspersonen nicht für direkte oder indirekte Schäden, insbesondere\
      \ nicht für Datenverlust oder sonstige immaterielle Schäden oder entgangenen\
      \ Gewinn, die sich ergeben aus (nicht abschliessende Aufzählung):\n\n- der Nutzung\
      \ oder dem Herunterladen unrichtiger, unvollständiger oder rechtswidriger Inhalte\
      \ aus den SWISSUbase-Diensten;\n\n- der Nutzung oder dem Herunterladen unrichtiger,\
      \ unvollständiger oder rechtswidriger Inhalte in den Nutzer-Uploads;\n\n- dem\
      \ Verlust oder der Beschädigung von Nutzer-Uploads;\n\n- der Nichtverfügbarkeit\
      \ der SWISSUbase-Dienste, z. B. infolge technischer Probleme;\n\n- den auf der\
      \ Plattform verfügbaren Inhalten sowie allen verlinkten Drittwebsites und deren\
      \ Inhalten;\n\n- der Einstellung aller oder einzelner SWISSUbase-Dienste oder\
      \ deren Änderung;\n\n- dem Verhalten Dritter, z. B. durch Missbrauch von Daten;\n\
      \n- unbefugtem Zugriff auf oder Änderungen Ihrer Daten.\n\n\n16. Beendigung\
      \ des Hinterlegungsvertrags\n\nDieser Hinterlegungsvertrag kann jederzeit gekündigt\
      \ werden. Die Kündigung ist schriftlich an support@swissubase.ch zu richten.\n\
      \nBei Kündigung werden sämtliche Ihre Nutzer-Uploads gelöscht, sofern keine\
      \ gesetzliche Aufbewahrungspflicht für Personendaten besteht. SWISSUbase und\
      \ die Kooperationspartner behalten sich jedoch das Recht vor, bestimmte Metadaten\
      \ im Zusammenhang mit den Nutzer-Uploads (z. B. Zitation bereits veröffentlichter\
      \ Datensätze) zwecks Nachvollziehbarkeit aufzubewahren (z. B. «Tombstone-Seite»\
      \ für zuvor veröffentlichte Datensätze).\n\nDieser Hinterlegungsvertrag endet\
      \ ohne weiteres, falls Ihre Nutzer-Uploads gemäss Ziff. 11 von der Plattform\
      \ gelöscht werden.\n\nIm Falle der Beendigung dieses Hinterlegungsvertrags,\
      \ unabhängig vom Grund, bleiben sämtliche Verpflichtungen aus diesem Vertrag,\
      \ die ihrer Natur nach über die Beendigung des Vertragsverhältnisses hinaus\
      \ fortbestehen sollen, unberührt. Dies gilt insbesondere für Haftungsbestimmungen.\n\
      \n\n17. Salvatorische Klausel\n\nDie Ungültigkeit einzelner Bestimmungen dieses\
      \ Hinterlegungsvertrags berührt nicht die Rechtsgültigkeit der übrigen Bestimmungen.\
      \ In diesem Fall kann jede Partei verlangen, dass die ungültige Bestimmung durch\
      \ eine Bestimmung ersetzt wird, die dem angestrebten wirtschaftlichen Zweck\
      \ am nächsten kommt.\n\n\n18. Anwendbares Recht und Gerichtsstand\n\nDieses\
      \ Vertragsverhältnis (Hinterlegungsvertrag) untersteht materiellem schweizerischem\
      \ Recht.\nDie Bestimmungen des Wiener Kaufrechts (Übereinkommen der Vereinten\
      \ Nationen über Verträge über den internationalen Warenkauf vom 11. April 1980)\
      \ sind ausgeschlossen. Für alle Streitigkeiten aus diesem Vertrag sind die Gerichte\
      \ in Lausanne zuständig.\n\n\n19. Sprachversionen\n\nDie Originalsprache dieses\
      \ Hinterlegungsvertrags ist Englisch. Im Falle von Widersprüchen zwischen der\
      \ englischen Version und der Übersetzung geht die englische Version vor.\n\n\
      \n__________\n\n(1) Nutzer-Uploads bestehen aus: der Beschreibung (Metadaten)\
      \ des Projekts und des Datensatzes, den hochgeladenen Dateien, Datensammlungen\
      \ sowie der Dokumentation. In bestimmten Fällen können Nutzer-Uploads ausschliesslich\
      \ aus der Beschreibung (Metadaten) des Projekts und des Datensatzes bestehen,\
      \ ohne dass physische Dateien hochgeladen werden (die Dateien werden in diesem\
      \ Fall an einem anderen Ort ausserhalb von SWISSUbase gespeichert).\n(2) https://info.swissubase.ch/resources/?sr=2529\
      \ [10.09.2025]\n(3) https://info.swissubase.ch/resources/?sr=2537 [10.09.2025]\n\
      (4) Personendaten sind alle Angaben, die sich auf eine bestimmte oder bestimmbare\
      \ natürliche Person beziehen. Besonders schützenswerte Personendaten sind insbesondere\
      \ Daten über religiöse, weltanschauliche, politische oder gewerkschaftliche\
      \ Ansichten oder Tätigkeiten, zur Gesundheit, zur Intimsphäre oder zur Zugehörigkeit\
      \ zu einer Rasse oder Ethnie, genetische Daten, biometrische Daten, die eine\
      \ natürliche Person eindeutig identifizieren, sowie Daten zu Verwaltungs- und\
      \ Strafverfahren oder Sanktionen und zu Massnahmen der sozialen Hilfe.\n(5)\
      \ Hochladen umfasst hier auch die Weiterverarbeitung der Nutzer-Uploads durch\
      \ SWISSUbase und die Kooperationspartner, insbesondere: Überprüfung durch die\
      \ zuständige DSU, Veröffentlichung auf der Plattform und Archivierung.\n(6)\
      \ SWISSUbase behält sich das Recht vor, Stichproben zur Überprüfung der Anonymität\
      \ von Nutzer-Uploads durchzuführen und kann, falls die Nutzer-Uploads Personendaten\
      \ enthalten, den Nachweis verlangen, dass Sie und wir zur Verarbeitung berechtigt\
      \ sind.\n(7) Siehe Ziff. 8.\n(8) Die maximale Dauer der Langzeitarchivierung\
      \ der Nutzer-Uploads wird von der jeweiligen DSU festgelegt. Nutzer-Uploads\
      \ werden mindestens 10 Jahre aufbewahrt, sofern sie nicht vorher gelöscht werden.\n\
      (9) https://info.swissubase.ch/privacy-notice/ [10.09.2025]\n(10) https://info.swissubase.ch/resources/?sr=2317#Technical_Integrations_and_Service_Providers_\
      \ [10.09.2025]\n(11) https://info.swissubase.ch/resources/?sr=2323 [10.09.2025]\n\
      \n__________\n\n\nANHANG A: LISTE DER KOOPERATIONSPARTNER VON SWISSUBASE\n\n\
      1. Swiss National Data and Service Center for the Humanities (DaSCH)\n\nDas\
      \ Swiss National Data and Service Center for the Humanities (DaSCH) ist Kooperationspartner\
      \ von SWISSUbase im Fachbereich:\n\n- Humanities"
