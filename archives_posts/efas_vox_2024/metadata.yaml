      \ die zusätzlich zu diesem Hinterlegungsvertrag anwendbar sind. Alle in diesem\
      \ Hinterlegungsvertrag verwendeten, aber nicht definierten Begriffe haben die\
      \ gleiche Bedeutung wie in den Nutzungsbedingungen.\n \n\n2. Vertragsparteien\n\
      \nVertragsparteien dieses Vertrags sind:\n- Sie als Datenhinterleger*in; und\n\
      - die SWISSUbase-Partnerinstitutionen des SWISSUbase-Konsortiums (nachfolgend\
