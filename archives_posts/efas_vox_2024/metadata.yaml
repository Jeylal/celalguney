      translation: Schweiz
    Abstract:
    - languageCode: en
      translation: 'Follow-up surveyof voters; continuous investigation of the voting
        behavior; theoretical references: sociological and socio-psychological approach.
        Essential variables of the questionnaire: Voting behavior according to political
        and social characteristics, political dimensions such as party affiliation,
        left-right orientation, values, updates through the voting campaign (knowledge,
        arguments).'
    - languageCode: de
      translation: 'Nachbefragung von Stimmberechtigten; kontinuierliches Erforschen
        des Abstimmungsverhaltens; theoretische Bezüge: soziologischer und sozialpsychologischer
        Ansatz. Wesentliche Variablen des Fragebogens: Abstimmungsverhalten nach politischen
        und gesellschaftlichen Merkmalen, politischen Dimensionen wie Parteibindung,
        Links-Rechts-Orientierung, Werthaltungen, Aktualisierungen durch die Abstimmungskampagne
        (Kenntnisse, Argumente).'
