  Domain specific metadata:
    Methods:
      Method description:
        DE: "Grundgesamtheit: Stimmberechtigte Schweizer Bevölkerung im Alter zwischen\
          \ 18 und 84 Jahren. Geographischer Bezugsraum: ganze Schweiz (Sprachräume:\
          \ deutsch, französisch, italienisch). Zeitbezug: seit 1997, jeweils erste\
          \ bis dritte Woche nach jedem eidg. Urnengang (3-4x pro Jahr).\r\nAuswahlverfahren:\
          \ Random-Quota. Stichprobengrösse: ca. 1000 Befragte. Juni: telefonische\
          \ Befragung.\r\nBis 2 Wochen nach der Abstimmung; Standardisierter Fragebogen\
          \ mit einigen offenen Fragen. Datenerhebung durch gfs.bern. \r\nAnalysemethoden:\
          \ Statistische Analyse mit SPSS; statistische Fehlerspanne +/- 3%.\r\nErhebungsverfahren:\
          \ Standardisierte Befragung telephonisch, standardisierte Fragebogen"
      Method (instruments):
      - Method instrument: by telephone
      - Other method instrument: 'Anderes Verfahren: standardisierte Fragebogen'
