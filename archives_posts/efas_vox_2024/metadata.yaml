      \ Géopolis, CH-1015 Lausanne) vertritt die einfache Gesellschaft (Art. 530 ff.\
      \ OR) SWISSUbase gegenüber Dritten.\n\n\n3. Datenhinterleger*in, Projekt, Datensatz,\
      \ Projektleiter*in\n\t \nDatenhinterleger*in: Sara Rellstab, gfs.bern\nProjekt:\
      \ VOX-Analysen eidgenössischer Urnengänge: Befragung von Stimmberechtigten nach\
      \ eidgenössischen Abstimmungen von 1981 bis 2016, 225\nDatensatz: Vox 147 -\
      \ Abstimmung 24.11.2024, 3228, 1.0\nProjektleiter*in (Principal Investigator):\
      \ Urs Bieri, Hanspeter Kriesi \n\n*Sie bestätigen, dass Sie berechtigt sind,\
      \ diesen Hinterlegungsvertrag zu unterzeichnen, sei es in eigenem Namen, im\
      \ Namen einer Schweizer Hochschule oder einer Drittpartei und, falls zutreffend,\
      \ in Übereinstimmung mit vorgängigen Kooperationsvereinbarungen mit anderen\
      \ Forschungspartnern.\n\n\n4. Data Service Units\nJede SWISSUbase-Partnerinstitution\
      \ (FORS, UNINE, UZH) sowie jeder Kooperationspartner richtet eine Data Service\
      \ Unit (nachfolgend “DSU”) ein. Die zuständige DSU ist die erste Ansprechstelle\
      \ für Fragen zur Vorbereitung, Veröffentlichung und Nutzung von Nutzer-Uploads\
      \ durch Dritte auf der Plattform. Die jeweilige DSU ist keine Vertragspartei\
      \ dieses Vertrages.\n\nJede DSU kann in einer separaten DSU-Richtlinie weitere\
      \ Anforderungen an Nutzer-Uploads (z. B. akzeptierte Dateitypen) festlegen,\
      \ berechtigte Datenhinterleger*innen definieren oder weitere Bedingungen für\
      \ die Hinterlegung von Nutzer-Uploads in der jeweiligen Disziplin oder Institution\
      \ bestimmen. DSU-Richtlinien sind auf der Info-Website (3) verfügbar.\n\n\n\
      5. Allgemeine Anforderungen an Nutzer-Uploads\n\nAls Datenhinterleger*in bestätigen\
      \ Sie hiermit insbesondere, dass:\n\na) die Nutzer-Uploads rechtmässig erlangt\
      \ wurden und, falls relevant, zur Hinterlegung auf der Plattform rechtlich zulässig\
